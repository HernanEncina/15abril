version: 0.2

phases:
  pre_build:
    commands:
      - chmod 400 sgtKeyes.pem
      - docker build -t calculadora-app:latest .
  
  build:
    commands:
      - docker run --name test-container calculadora-app:latest
      - docker cp test-container:/app/resultado.json ./resultado.json
      - docker cp test-container:/app/backup.log ./backup.log
      - docker rm test-container
  
  post_build:
    commands:
      - scp -o StrictHostKeyChecking=no -i sgtKeyes.pem resultado.json ubuntu@$EC2_IP:/home/ubuntu/calculadora/
      - scp -o StrictHostKeyChecking=no -i sgtKeyes.pem backup.log ubuntu@$EC2_IP:/home/ubuntu/calculadora/
      - ssh -o StrictHostKeyChecking=no -i sgtKeyes.pem ubuntu@$EC2_IP "cd /home/ubuntu/calculadora && cat backup.log"

artifacts:
  files:
    - resultado.json
    - backup.log