version: 0.2

env:
  variables:
    APP_DIR: /home/ec2-user/calculadora

phases:
  install:
    commands:
      - echo "Installing dependencies..."
      - yum install -y openssh-clients

  pre_build:
    commands:
      - echo "Setting up SSH key..."
      - chmod 600 key.pem

  build:
    commands:
      - echo "Testing SSH connection..."
      - ssh -o StrictHostKeyChecking=no -i key.pem ec2-user@$EC2_IP "echo Connected"

      - echo "Fetching backup log..."
      - ssh -o StrictHostKeyChecking=no -i key.pem ec2-user@$EC2_IP "cat $APP_DIR/backup.log || echo 'No backup.log found'"

  post_build:
    commands:
      - echo "Deploying container..."

      - ssh -o StrictHostKeyChecking=no -i key.pem ec2-user@$EC2_IP "docker stop calculadora || true"
      - ssh -o StrictHostKeyChecking=no -i key.pem ec2-user@$EC2_IP "docker rm calculadora || true"

      - ssh -o StrictHostKeyChecking=no -i key.pem ec2-user@$EC2_IP "docker run -d -p 80:3000 --name calculadora calculadora-app:latest"

artifacts:
  files:
    - '**/*'